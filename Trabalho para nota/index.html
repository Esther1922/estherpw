<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <h2>Movimente as barras para construir sua cor</h2>
        <span class="cor-resultante">cor resultante</span>

        <div class="sliders">
            <div class="box red">
                <h3>Vermelho (R)</h3>
                <input type="range" id="red" min="0" max="255" value="0">
                <span class="limite-max">255</span>
                <p id="redValue">0</p>
            </div>

            <div class="box green">
                <h3>Verde (G)</h3>
                <input type="range" id="green" min="0" max="255" value="0">
                <span class="limite-max">255</span>
                <p id="greenValue">0</p>
            </div>

            <div class="box blue">
                <h3>Azul (B)</h3>
                <input type="range" id="blue" min="0" max="255" value="0">
                <span class="limite-max">255</span>
                <p id="blueValue">0</p>
            </div>
           
        </div>
        
    

    <script src="script.js"></script>
</body>
</html>
</body>
</html>
